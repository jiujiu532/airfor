services:
  gpt-load:
    image: ghcr.io/tbphp/gpt-load:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: gpt-load
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env
    restart: always
    volumes:
      - ./data:/app/data
    stop_grace_period: ${SERVER_GRACEFUL_SHUTDOWN_TIMEOUT:-10}s
    healthcheck:
      test: wget -q --spider -T 10 -O /dev/null http://localhost:${PORT:-3001}/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      solver:
        condition: service_started
    # depends_on:
    #   mysql:
    #     condition: service_healthy
    #     restart: true
    #   postgres:
    #     condition: service_healthy
    #     restart: true
    #   redis:
    #     condition: service_healthy
    #     restart: true

  # Turnstile CAPTCHA 打码服务 (自动注册需要)
  solver:
    image: ghcr.io/tbphp/gpt-load-solver:latest
    # build:
    #   context: ./solver
    #   dockerfile: Dockerfile
    container_name: gpt-load-solver
    restart: always
    # 默认不暴露端口到宿主机，gpt-load 通过 docker 内网访问
    # 如需外部访问打码服务，取消下面注释
    # ports:
    #   - "5072:5072"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5072/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 如果需要安装 MySQL、PostgreSQL 或 Redis，请取消以下注释并配置相应的环境变量。
  # 并且要在上方的depends_on中取消注释相应的依赖服务。

